<title>Finanzplaner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#000;--surface:#0F100E;--border:rgba(250,250,247,.18);--border-strong:rgba(250,250,247,.55);--text:#FAFAF7;--muted:rgba(250,250,247,.5);--accent:#FAFAF7;--safe-top:env(safe-area-inset-top);--safe-bot:env(safe-area-inset-bottom)}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,sans-serif}
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto}
.setup{flex:1;display:flex;flex-direction:column;justify-content:center;padding:32px 24px;gap:20px}
.setup h1{font-size:22px;font-weight:600}
.setup p{font-size:13px;color:var(--muted);line-height:1.6}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.field input{width:100%;background:var(--surface);border:1px solid var(--border-strong);color:var(--text);font-family:inherit;font-size:15px;padding:13px 14px;outline:none;-webkit-appearance:none;border-radius:0}
.field input::placeholder{color:var(--muted)}
.btn{background:var(--accent);color:#000;font-family:inherit;font-size:15px;font-weight:600;padding:14px;border:none;cursor:pointer;width:100%}
.btn:active{opacity:.8}
.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border-strong);font-family:inherit;font-size:13px;padding:10px;cursor:pointer;width:100%}
.center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px;text-align:center}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ptr-spinner{width:22px;height:22px;border:2px solid rgba(250,250,247,.15);border-top-color:rgba(250,250,247,.6);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
.ptr-hint{text-align:center;padding:12px 0;font-size:11px;color:rgba(250,250,247,.3);display:none}

.center p,.err-msg{font-size:14px;color:var(--muted);line-height:1.6;max-width:300px}
.header{padding:calc(var(--safe-top) + 14px) 20px 12px;display:flex;align-items:baseline;justify-content:space-between;border-bottom:1px solid var(--border)}
.header-title{font-size:13px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--muted)}
.header-sub{font-size:11px;color:var(--muted)}
.reload-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:2px 6px}
.tab-content{flex:1;overflow-y:auto;padding:12px 16px;-webkit-overflow-scrolling:touch}
.home-cards{display:flex;flex-direction:column;gap:8px;height:calc(100svh - 148px);min-height:0}
.home-cards>*{flex:1;margin-bottom:0 !important;min-height:0;overflow:hidden}
.bottom-nav{display:flex;border-top:1px solid var(--border);padding-bottom:var(--safe-bot);background:var(--bg)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:11px 8px;background:none;border:none;cursor:pointer;font-family:inherit}
.nav-btn svg{width:20px;height:20px;stroke:var(--muted);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.nav-btn span{font-size:10px;color:var(--muted);letter-spacing:.03em}
.nav-btn.active svg{stroke:var(--accent)}
.nav-btn.active span{color:var(--accent)}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.kpi-card{background:var(--surface);border:1px solid var(--border-strong);padding:14px;margin-bottom:8px;display:flex;flex-direction:column;gap:4px}
.kpi-card:last-of-type{margin-bottom:8px}
.kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)}
.kpi-val{font-size:20px;font-weight:600;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.kpi-sub{font-size:11px;color:var(--muted)}
.section-line{height:1px;background:var(--border);margin:20px 0 16px}
.section-title{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:12px}
.hb-card{background:var(--surface);border:1px solid var(--border-strong);padding:14px;margin-bottom:8px}
.hb-card.current{background:var(--surface);border:1px solid var(--border-strong)}
.hb-card-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.hb-card-period{font-size:12px;font-weight:500}
.hb-card-badge{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.hb-card.current .hb-card-badge{font-weight:700;color:var(--text)}
.hb-hero{font-size:26px;font-weight:600;font-variant-numeric:tabular-nums;letter-spacing:-.02em;margin-bottom:2px}
.hb-hero-label{font-size:11px;color:var(--muted);margin-bottom:10px}
.hb-bar-wrap{height:3px;background:rgba(250,250,247,.1);position:relative;margin-bottom:4px}
.hb-bar-fill{height:100%;background:var(--accent)}
.hb-bar-tick{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--accent);opacity:.4;transform:translateX(-50%)}
.hb-bar-info{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);font-variant-numeric:tabular-nums}
.hb-foot{font-size:11px;color:var(--muted);margin-top:8px}
.schuld-bar-wrap{height:3px;background:rgba(250,250,247,.1);margin:8px 0 6px}
.schuld-bar-fill{height:100%;background:var(--accent)}
.schuld-row{display:flex;justify-content:space-between;align-items:baseline}
.schuld-val{font-size:18px;font-weight:600;font-variant-numeric:tabular-nums}
.schuld-sub{font-size:11px;color:var(--muted)}
.fab{position:fixed;bottom:calc(var(--safe-bot) + 68px);right:20px;width:52px;height:52px;background:var(--accent);color:#000;border:none;border-radius:50%;cursor:pointer;font-size:24px;font-weight:300;display:flex;align-items:center;justify-content:center;z-index:50;line-height:1}
.modal-overlay{position:fixed;top:0;right:0;bottom:0;left:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:calc(var(--safe-top) + 16px) 20px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-title{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.modal-close{background:none;border:none;color:var(--text);font-size:30px;font-weight:300;cursor:pointer;padding:0;line-height:1}
.modal-body{flex:1}
.amount-wrap{padding:24px 20px 20px;border-bottom:1px solid var(--border)}
.amount-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:10px;display:block}
.amount-input{font-size:48px;font-weight:300;font-variant-numeric:tabular-nums;width:100%;background:none;border:none;color:var(--text);font-family:inherit;padding:0;outline:none;text-align:right;display:block}
.type-toggle{display:flex;margin:20px 20px 0}
.type-btn{flex:1;padding:11px;background:none;border:1px solid var(--border-strong);color:var(--muted);font-family:inherit;font-size:14px;cursor:pointer}
.type-btn:first-child{border-right:none}
.type-btn.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
.cat-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:20px 20px 10px;display:block}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 20px}
.cat-btn{padding:11px 6px;background:none;border:1px solid var(--border-strong);color:var(--muted);font-family:inherit;font-size:13px;cursor:pointer;text-align:center}
.cat-btn.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
.desc-input{width:calc(100% - 40px);margin:20px 20px 0;background:var(--surface);border:1px solid var(--border-strong);color:var(--text);font-family:inherit;font-size:14px;padding:12px;outline:none;display:block}
.desc-input::placeholder{color:var(--muted)}
.m-field{padding:14px 20px 0;display:flex;flex-direction:column;gap:6px}
.m-input{width:100%;background:#0F100E;border:1px solid rgba(250,250,247,.25);color:#FAFAF7;font-family:inherit;font-size:15px;padding:13px 12px;border-radius:0;outline:none;-webkit-appearance:none;appearance:none;color-scheme:dark}
.m-input::placeholder{color:rgba(250,250,247,.3)}
.m-input:focus{border-color:rgba(250,250,247,.6)}
.modal-footer{padding:20px 20px calc(var(--safe-bot) + 20px);display:flex;gap:8px}
.modal-save{flex:1;background:var(--accent);color:#000;font-family:inherit;font-size:15px;font-weight:600;padding:14px;border:none;cursor:pointer;border-radius:0}
.modal-cancel{flex:1;background:none;border:1px solid var(--border-strong);color:var(--muted);font-family:inherit;font-size:15px;font-weight:600;padding:14px;cursor:pointer;border-radius:0}
.toast{position:fixed;bottom:calc(var(--safe-bot) + 80px);left:50%;transform:translateX(-50%);background:var(--accent);color:#000;font-size:13px;font-weight:600;padding:10px 20px;z-index:200;animation:tin .1s ease,tout .3s ease 1.7s forwards;white-space:nowrap}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%)}}
@keyframes tout{to{opacity:0}}

/* ── NEW: Home Tab ── */
.home-hero{padding:20px 16px 14px;border-bottom:1px solid var(--border)}
.home-hero-val{font-size:44px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-2px;line-height:1}
.home-hero-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-top:4px}
.home-kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
.home-kpi{background:var(--bg);padding:14px 16px}
.home-kpi-val{font-size:20px;font-weight:600;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.home-kpi-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-top:3px}
.add-btn{width:calc(100% - 32px);margin:16px;background:var(--accent);color:#000;border:none;font-family:inherit;font-size:15px;font-weight:600;padding:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.add-btn:active{opacity:.8}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 8px}
.sec-ttl{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.sec-val{font-size:12px;font-variant-numeric:tabular-nums;color:var(--muted)}
.sec-warn{color:var(--text);font-weight:600}
.inv-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border)}
.inv-row:last-child{border-bottom:none}
.inv-name{font-size:14px;font-weight:500}
.inv-meta{font-size:11px;color:var(--muted);margin-top:2px}
.inv-right{text-align:right}
.inv-amt{font-size:14px;font-weight:600;font-variant-numeric:tabular-nums}
.inv-status{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-top:2px}
.inv-status.warn{color:var(--text)}
.inv-card{background:var(--surface);margin:0 16px 8px}
.inv-pay-btn{background:none;border:1px solid var(--border-strong);color:var(--muted);font-family:inherit;font-size:11px;padding:5px 10px;cursor:pointer;margin-top:6px}
.inv-pay-btn:active{background:var(--accent);color:#000;border-color:var(--accent)}

/* ── NEW: Analyse Tab ── */
.analyse-total{padding:20px 16px 14px;border-bottom:1px solid var(--border)}
.analyse-total-val{font-size:36px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-1.5px}
.analyse-total-lbl{font-size:11px;color:var(--muted);margin-top:3px}
.cat-row{padding:11px 16px;border-bottom:1px solid rgba(250,250,247,.06)}
.cat-row-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.cat-row-name{font-size:13px;font-weight:500}
.cat-row-amt{font-size:13px;font-variant-numeric:tabular-nums;font-weight:600}
.cat-bar-wrap{height:2px;background:rgba(250,250,247,.1)}
.cat-bar-fill{height:2px;background:var(--accent)}
.cat-row-pct{font-size:10px;color:var(--muted);margin-top:3px}
.donut-wrap{padding:16px;display:flex;justify-content:center}
.source-row{display:flex;justify-content:space-between;padding:10px 16px;border-bottom:1px solid rgba(250,250,247,.06);font-size:13px}
.source-lbl{color:var(--muted)}
.source-val{font-variant-numeric:tabular-nums;font-weight:500}

/* ── NEW: Budget Tab ── */
.budget-month-card{background:var(--surface);border:1px solid var(--border);margin:0 16px 12px}
.budget-month-card.active{border-left:3px solid var(--accent)}
.bmc-head{display:flex;justify-content:space-between;align-items:baseline;padding:13px 14px 6px}
.bmc-period{font-size:12px;font-weight:600}

.inv-sec-t{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:rgba(250,250,247,.5)}

<body>
<div id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
const CFG_KEY='fp_mobile_cfg_v2';
const MON_S=['Jan','Feb','Mrz','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
const MON_F=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
const GRAPH='https://graph.microsoft.com/v1.0';
const SCOPE='https://graph.microsoft.com/Files.ReadWrite offline_access';

let cfg=null, token=null, payload=null;
let tab='home', showAdd=false, saving=false;
let addForm={amount:'',type:'out',cat:'',desc:''};
let _status='init', _errMsg='';

// ── Config ──────────────────────────────────────────────
function loadCfg(){ try{ return JSON.parse(localStorage.getItem(CFG_KEY)); }catch(e){ return null; } }
function saveCfg(c){ localStorage.setItem(CFG_KEY,JSON.stringify(c)); }

// ── PKCE OAuth (no external library) ────────────────────
function redirectUri(){ return window.location.href.split('?')[0].split('#')[0]; }
function tenantAuthority(){ return 'https://login.microsoftonline.com/'+(cfg.tenantId||'common'); }

function b64url(buf){
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
function genVerifier(){
  const a=new Uint8Array(32); crypto.getRandomValues(a); return b64url(a.buffer);
}
async function genChallenge(v){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(v));
  return b64url(buf);
}

async function startLogin(){
  const v=genVerifier();
  const ch=await genChallenge(v);
  localStorage.setItem('pkce_v',v);
  localStorage.setItem('pkce_state',cfg.filePath);
  const p=new URLSearchParams({
    client_id:cfg.clientId, response_type:'code',
    redirect_uri:redirectUri(), scope:SCOPE,
    code_challenge:ch, code_challenge_method:'S256',
    response_mode:'query'
  });
  window.location.href=tenantAuthority()+'/oauth2/v2.0/authorize?'+p;
}

async function handleRedirect(){
  const p=new URLSearchParams(window.location.search);
  const code=p.get('code');
  if(!code) return false;
  window.history.replaceState({},'',redirectUri());
  const v=localStorage.getItem('pkce_v');
  if(!v) return false;
  const r=await fetch(tenantAuthority()+'/oauth2/v2.0/token',{
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:new URLSearchParams({
      client_id:cfg.clientId, grant_type:'authorization_code',
      code, redirect_uri:redirectUri(),
      code_verifier:v, scope:SCOPE
    })
  });
  const d=await r.json();
  if(d.access_token){ token=d.access_token; if(d.refresh_token) localStorage.setItem('rt',d.refresh_token); localStorage.removeItem('pkce_v'); return true; }
  throw new Error(d.error_description||'Token-Fehler');
}

async function refreshToken(){
  const rt=localStorage.getItem('rt'); if(!rt) return false;
  const r=await fetch(tenantAuthority()+'/oauth2/v2.0/token',{
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:new URLSearchParams({client_id:cfg.clientId,grant_type:'refresh_token',refresh_token:rt,scope:SCOPE})
  });
  const d=await r.json();
  if(d.access_token){ token=d.access_token; if(d.refresh_token) localStorage.setItem('rt',d.refresh_token); return true; }
  localStorage.removeItem('rt'); return false;
}

async function ensureToken(){
  if(token) return true;
  if(await refreshToken()) return true;
  return false;
}

// ── Graph API ────────────────────────────────────────────
async function graphGet(path){
  if(!await ensureToken()) throw new Error('Nicht angemeldet');
  const r=await fetch(GRAPH+path,{headers:{'Authorization':'Bearer '+token}});
  if(r.status===401){ token=null; if(await refreshToken()){ return graphGet(path); } throw new Error('Sitzung abgelaufen. Neu laden.'); }
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r;
}
async function graphPut(path,data){
  if(!await ensureToken()) throw new Error('Nicht angemeldet');
  const r=await fetch(GRAPH+path,{method:'PUT',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify(data,null,2)});
  if(!r.ok) throw new Error('HTTP '+r.status);
}
async function loadFile(){
  const enc=cfg.filePath.split('/').map(encodeURIComponent).join('/');
  const r=await graphGet('/me/drive/root:/'+enc+':/content');
  payload=await r.json();
}
async function saveFile(){
  if(!payload) return;
  saving=true; render();
  try{ const enc=cfg.filePath.split('/').map(encodeURIComponent).join('/'); await graphPut('/me/drive/root:/'+enc+':/content',payload); }
  catch(e){ showToast('Fehler: '+e.message); }
  finally{ saving=false; render(); }
}

// ── HB helpers ───────────────────────────────────────────
function fmt(v){ if(v===null||v===undefined||isNaN(v)) return '—'; const neg=v<0,abs=Math.abs(v),p=abs.toFixed(2).split('.'); p[0]=p[0].replace(/\B(?=(\d{3})+(?!\d))/g,"'"); return (neg?'−':'')+p.join('.'); }
function fmtC(v){ return 'CHF '+fmt(v); }
function hbKey(y,m){ return y+'-'+String(m+1).padStart(2,'0'); }
function hbCfg(){ return payload?.data?._hb?.config||{defaultDay:25}; }
function hbPer(){ return payload?.data?._hb?.periods||{}; }
function hbLohnDay(y,m){ return hbPer()[hbKey(y,m)]?.lohnDay||hbCfg().defaultDay||25; }
function hbStart(y,m){ const k=hbKey(y,m),s=hbPer()[k]?.startISO; if(s){const d=new Date(s+'T00:00:00');if(!isNaN(d))return d;} const day=hbLohnDay(y,m); return new Date(y,m,Math.min(day,new Date(y,m+1,0).getDate())); }
function hbEnd(y,m){ const k=hbKey(y,m),s=hbPer()[k]?.endISO; if(s){const d=new Date(s+'T00:00:00');if(!isNaN(d))return d;} const ny=m===11?y+1:y,nm=(m+1)%12; return new Date(hbStart(ny,nm).getTime()-86400000); }
function hbEntries(y,m){ return hbPer()[hbKey(y,m)]?.entries||[]; }
function hbSum(y,m,t){ return hbEntries(y,m).filter(e=>e.type===t).reduce((s,e)=>s+(e.amount||0),0); }
function hbBudget(y,m){ return hbPer()[hbKey(y,m)]?.budget||0; }
function hbCalc(y,m){
  const today=new Date();today.setHours(0,0,0,0);
  const start=hbStart(y,m),end=hbEnd(y,m);
  const isCur=today>=start&&today<=end,isPast=!isCur&&today>end,isFuture=!isCur&&!isPast;
  const budget=hbBudget(y,m),ausgaben=hbSum(y,m,'out'),einnahmen=hbSum(y,m,'in');
  const saldo=budget+einnahmen-ausgaben,totalDays=Math.round((end-start)/86400000)+1;
  let remainDays=0,perDay=0,dayUsed=0,avgDay=0;
  if(isCur){remainDays=Math.max(0,Math.round((end-today)/86400000)+1);perDay=remainDays>0?saldo/remainDays:0;dayUsed=Math.max(1,Math.round((today-start)/86400000)+1);}
  else if(isPast){dayUsed=totalDays;}
  avgDay=dayUsed>0&&ausgaben>0?ausgaben/dayUsed:0;
  const pct=budget>0?Math.min(100,ausgaben/(budget+einnahmen)*100):0;
  const dStr=d=>String(d.getDate()).padStart(2,'0')+'. '+MON_S[d.getMonth()];
  return {budget,ausgaben,einnahmen,saldo,totalDays,remainDays,perDay,dayUsed,avgDay,pct,isCur,isPast,isFuture,start,end,label:dStr(start)+' – '+dStr(end)};
}
function hbCurPeriod(){ const t=new Date(); for(let m=0;m<12;m++){const c=hbCalc(t.getFullYear(),m);if(c.isCur)return{y:t.getFullYear(),m};} return{y:t.getFullYear(),m:t.getMonth()}; }
function hbNext(y,m){ return m===11?{y:y+1,m:0}:{y,m:m+1}; }
function hbCats(){ const c=payload?.data?._hb?.config?.categories||[]; if(c.length)return c.map(x=>typeof x==='string'?{id:x,label:x}:x); return [{id:'lebensmittel',label:'Lebensm.'},{id:'restaurant',label:'Restaurant'},{id:'transport',label:'Transport'},{id:'gesundheit',label:'Gesundheit'},{id:'freizeit',label:'Freizeit'},{id:'haushalt',label:'Haushalt'},{id:'kleidung',label:'Kleidung'},{id:'sonstiges',label:'Sonstiges'}]; }

// ── KPI helpers ───────────────────────────────────────────
function mVal(id,m,y){ return payload?.data?.[y||new Date().getFullYear()]?.[id]?.months?.[m]||0; }
function schuldenAktuell(){ let t=0; (payload?.structure||[]).find(c=>c.id==='verbind')?.subcats?.forEach(sc=>(sc.items||[]).forEach(it=>{t+=(payload?.data?.[new Date().getFullYear()]?.[it.id]?.ansatz||0);})); return t; }
function schuldenStart(){ let t=0; const structure=payload?.structure||[]; const v=structure.find(c=>c.id==='verbind'); v?.subcats?.forEach(sc=>(sc.items||[]).forEach(it=>{t+=(payload?.data?.[2024]?.[it.id]?.ansatz||payload?.data?.[2025]?.[it.id]?.ansatz||0);})); return t||schuldenAktuell(); }

// ── Add entry ────────────────────────────────────────────
async function addEntry(){
  const amt=parseFloat(String(addForm.amount).replace(/[']/g,'').replace(',','.'));
  if(!amt||isNaN(amt)){showToast('Betrag eingeben');return;}
  const{y,m}=hbCurPeriod(),k=hbKey(y,m);
  if(!payload.data._hb)payload.data._hb={config:{defaultDay:25},periods:{}};
  if(!payload.data._hb.periods[k])payload.data._hb.periods[k]={entries:[]};
  payload.data._hb.periods[k].entries.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),type:addForm.type,amount:amt,desc:addForm.desc||addForm.cat||'',cat:addForm.cat||null,date:addForm.date||new Date().toISOString().slice(0,10)});
  addForm={amount:'',type:'out',cat:'',desc:''};showAdd=false;
  await saveFile();showToast('Gespeichert');
}

// ── Toast ─────────────────────────────────────────────────
function showToast(msg){ const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2100); }

// ── Render ────────────────────────────────────────────────
function render(){
  const app=document.getElementById('app');
  if(_status==='setup'){ app.innerHTML=renderSetup(); bindSetup(); return; }
  if(_status==='loading'){ app.innerHTML='<div class="center"><div class="spinner"></div><p>Verbinde…</p></div>'; return; }
  if(_status==='error'){ app.innerHTML=renderError(); bindError(); return; }
  app.innerHTML=renderMain(); bindMain();
}

function renderSetup(){
  return '<div class="setup"><h1>Finanzplaner</h1><p>Einmalige Einrichtung.</p>'+
  '<div class="field"><label>Azure Client ID</label><input id="s-cid" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" autocomplete="off" spellcheck="false"></div>'+
  '<div class="field"><label>OneDrive-Pfad</label><input id="s-path" placeholder="Dokumente/fp.json" autocomplete="off" spellcheck="false"></div>'+
  '<button class="btn" id="s-go">Verbinden</button></div>';
}
function bindSetup(){
  document.getElementById('s-go').onclick=async()=>{
    const cid=document.getElementById('s-cid').value.trim();
    const path=document.getElementById('s-path').value.trim().replace(/^\/+/,'');
    if(!cid||!path){showToast('Bitte ausfüllen');return;}
    cfg={clientId:cid,filePath:path,tenantId:'89cc8152-7ce8-4275-8e4e-de52f805c629'};
    saveCfg(cfg); await startLogin();
  };
}

function renderError(){
  return '<div class="center"><p class="err-msg">'+_errMsg+'</p><button class="btn" id="e-retry" style="max-width:220px">Erneut versuchen</button><button class="btn-ghost" id="e-reset" style="max-width:220px;margin-top:8px">Einstellungen zurücksetzen</button></div>';
}
function bindError(){
  document.getElementById('e-retry').onclick=boot;
  document.getElementById('e-reset').onclick=()=>{cfg=null;token=null;localStorage.clear();_status='setup';render();};
}

// ── Render Main Shell ────────────────────────────────────
function renderMain(){
  const now=new Date(),mo=MON_F[now.getMonth()]+' '+now.getFullYear();
  const tabs=[
    {id:'home',      lbl:'Home',       svg:'<path d="M3 12L12 3l9 9"/><path d="M9 21V12h6v9"/>'},
    {id:'ausgaben',  lbl:'Ausgaben',   svg:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/>'},
    {id:'rechnungen',lbl:'Rechnungen', svg:'<path d="M14 2H6a2 2 0 0 0-2 2v16h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>'},
    {id:'schulden',  lbl:'Schulden',   svg:'<path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>'},
  ];
  let nav='<div class="bottom-nav">';
  tabs.forEach(t=>{nav+='<button class="nav-btn'+(tab===t.id?' active':'')+'" id="nav-'+t.id+'"><svg viewBox="0 0 24 24">'+t.svg+'</svg><span>'+t.lbl+'</span></button>';});
  nav+='</div>';
  let content='';
  if(tab==='home') content=renderHome();
  else if(tab==='ausgaben') content=renderAusgaben();
  else if(tab==='rechnungen') content=renderRechnungen();
  else content=renderSchulden();
  return '<div class="header"><div><div class="header-title">Finanzplaner</div><div class="header-sub">'+mo+'</div></div><button class="reload-btn" id="btn-reload">↺</button></div>'+
    '<div id="ptr-hint" class="ptr-hint"></div><div class="tab-content" id="tab-content">'+content+'</div>'+nav;
}
function bindMain(){
  ['home','ausgaben','rechnungen','schulden'].forEach(id=>{
    document.getElementById('nav-'+id)?.addEventListener('click',()=>{tab=id;render();});
  });
  document.getElementById('btn-reload')?.addEventListener('click',async()=>{
    _status='loading';render();
    try{await loadFile();_status='ready';}catch(e){_status='error';_errMsg=e.message;}
    render();
  });
  // add card uses onclick directly
}

// ── Tab: Home ─────────────────────────────────────────────
function renderHome(){
  const{y:hy,m:hm}=hbCurPeriod(),hbc=hbCalc(hy,hm);
  const today=new Date();
  const todayISO=today.toISOString().slice(0,10);
  const todayAmt=hbEntries(hy,hm).filter(e=>e.type==='out'&&e.date===todayISO).reduce((s,e)=>s+(e.amount||0),0);
  const todayLast=hbEntries(hy,hm).filter(e=>e.type==='out'&&e.date===todayISO).slice(-1)[0];
  let h='';
  h+='<div class="home-cards">';
  // KPI 1: Verfügbar diesen Monat
  h+='<div class="kpi-card"><div class="kpi-label">Verfügbar diesen Monat</div><div class="kpi-val">'+(hbc.budget>0?fmtC(hbc.saldo):'—')+'</div>';
  if(hbc.budget>0) h+='<div class="kpi-sub">Budget '+fmtC(hbc.budget)+' · '+hbc.remainDays+' Tage rest</div>';
  h+='</div>';
  // KPI 2: Verfügbar heute
  h+='<div class="kpi-card"><div class="kpi-label">Verfügbar heute</div><div class="kpi-val">'+(hbc.isCur&&hbc.remainDays>0?fmtC(hbc.perDay):'—')+'</div>';
  if(hbc.isCur) h+='<div class="kpi-sub">CHF / Tag · '+hbc.remainDays+' Tage verbleibend</div>';
  h+='</div>';
  // KPI 3: Heute ausgegeben — mit letzten 3 Buchungen
  const todayEntries=hbEntries(hy,hm).filter(e=>e.type==='out'&&e.date===todayISO).slice(-3).reverse();
  h+='<div class="kpi-card"><div class="kpi-label">Heute ausgegeben</div><div class="kpi-val">'+(todayAmt>0?fmtC(todayAmt):'—')+'</div>';
  if(todayEntries.length){
    h+='<div style="margin-top:8px;border-top:1px solid rgba(250,250,247,.08);padding-top:8px">';
    todayEntries.forEach(e=>{
      h+='<div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px">';
      h+='<span style="color:rgba(250,250,247,.5);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:70%">'+esc(e.desc||e.cat||'—')+'</span>';
      h+='<span style="font-variant-numeric:tabular-nums;color:rgba(250,250,247,.6);flex-shrink:0">'+fmt(e.amount)+'</span>';
      h+='</div>';
    });
    h+='</div>';
  }
  h+='</div>';
  // Budget-Card (exactly like screenshot)
  h+=budgetCard(hy,hm,hbc);
  // Add Card (full width, dark, +)
  h+='<div class="hb-add-card" onclick="openAddModal()"><span class="hb-add-ico">+</span></div>';
  h+='</div>';
  return h;
}

function budgetCard(y,m,c){
  const dStr=d=>String(d.getDate()).padStart(2,'0')+'. '+MON_S[d.getMonth()];
  let hero='—',hl='',bar='',foot='';
  if(c.isCur&&c.budget>0){
    hero=fmtC(c.perDay);hl='pro Tag · '+c.remainDays+' Tage verbleibend';
  } else if(c.isPast&&c.budget>0){
    hero=fmtC(c.avgDay);hl='Ø CHF / Tag';
  } else if(c.budget>0){
    hero=fmtC(c.budget);hl='Budget';
  }
  if(c.budget>0&&c.totalDays>0){
    const sp=Math.min(100,c.pct).toFixed(1);
    if(c.isCur){
      const tp=Math.min(100,c.dayUsed/c.totalDays*100).toFixed(1);
      bar='<div class="hb-bar-wrap"><div class="hb-bar-fill" style="width:'+sp+'%"></div><div class="hb-bar-tick" style="left:'+tp+'%"></div></div>';
      bar+='<div class="hb-bar-info"><span>'+fmtC(c.ausgaben)+' ausgegeben</span><span>Tag '+c.dayUsed+' / '+c.totalDays+'</span></div>';
    } else {
      bar='<div class="hb-bar-wrap"><div class="hb-bar-fill" style="width:'+sp+'%"></div></div>';
    }
  }
  const badge=c.isCur?'Laufend':c.isFuture?'Geplant':'Abgeschlossen';
  return '<div class="hb-card current">'+
    '<div class="hb-card-head"><span class="hb-card-period">'+dStr(c.start)+' – '+dStr(c.end)+'</span><span class="hb-card-badge">'+badge+'</span></div>'+
    '<div class="hb-hero">'+hero+'</div>'+
    '<div class="hb-hero-label">'+hl+'</div>'+
    bar+
    '</div>';
}

// ── Tab: Ausgaben ─────────────────────────────────────────
function renderAusgaben(){
  const today=new Date(),curY=today.getFullYear(),curM=today.getMonth();
  const{y:hy,m:hm}=hbCurPeriod(),hbc=hbCalc(hy,hm);
  const cats=hbCats();
  const catMap=Object.fromEntries(cats.map(c=>[c.id,c.label]));
  const COLORS=['#EE7F00','#1D9E75','#378ADD','#7F77DD','#D85A30','#888780'];
  const SHADES=[['#F59B2B','#F9BC6A'],['#5DCAA5','#9FE1CB'],['#85B7EB','#B5D4F4'],['#AFA9EC','#CECBF6'],['#F0997B','#F5C4B3'],['#B4B2A9','#D3D1C7']];

  // YTD: HHB + paid invoices
  let ytdAusg=0;
  for(let m=0;m<=curM;m++) ytdAusg+=hbSum(curY,m,'out');
  ytdAusg+=getInvoices().filter(i=>i.status==='bezahlt'&&(i.budgetJahr??curY)===curY).reduce((s,i)=>s+(i.betrag||0),0);

  // This month entries
  const entries=hbEntries(hy,hm).filter(e=>e.type==='out');
  const todayISO=today.toISOString().slice(0,10);
  const weekAgo=new Date(today-7*86400000).toISOString().slice(0,10);
  const todayAmt=entries.filter(e=>e.date===todayISO).reduce((s,e)=>s+(e.amount||0),0);
  const weekAmt=entries.filter(e=>e.date>=weekAgo).reduce((s,e)=>s+(e.amount||0),0);

  // Categories: HHB + paid invoices with hbKategorie
  const byCat={};
  entries.forEach(e=>{const k=e.cat||'_other';byCat[k]=(byCat[k]||0)+(e.amount||0);});
  const paidInvs=getInvoices().filter(i=>i.status==='bezahlt'&&i.hbKategorie&&(i.budgetMonat??0)===hm&&(i.budgetJahr??curY)===curY);
  paidInvs.forEach(i=>{byCat[i.hbKategorie]=(byCat[i.hbKategorie]||0)+(i.betrag||0);});
  const invTotal=paidInvs.reduce((s,i)=>s+(i.betrag||0),0);
  const total=Object.values(byCat).reduce((s,v)=>s+v,0);
  const groups=payload?.data?._hb?.config?.catGroups||[];

  let h='';
  // Saldo YTD
  h+='<div class="kpi-card"><div class="kpi-label">Ausgaben YTD '+curY+'</div><div class="kpi-val">'+fmtC(ytdAusg)+'</div><div class="kpi-sub">Jan – '+MON_S[curM]+' · '+(curM+1)+' Monate</div></div>';

  // Quick stats
  h+='<div class="stat-grid">';
  h+='<div class="stat-cell"><div class="stat-val">'+(todayAmt?fmt(todayAmt):'—')+'</div><div class="stat-lbl">Heute</div></div>';
  h+='<div class="stat-cell"><div class="stat-val">'+fmt(weekAmt)+'</div><div class="stat-lbl">Diese Woche</div></div>';
  h+='<div class="stat-cell"><div class="stat-val">'+fmt(hbc.ausgaben)+'</div><div class="stat-lbl">Periode</div></div>';
  h+='<div class="stat-cell"><div class="stat-val">'+Math.round(hbc.pct)+'%</div><div class="stat-lbl">Budget</div></div>';
  h+='</div>';

  // Donut chart
  if(total>0){
    const sorted=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
    const circ=2*Math.PI*44;
    let offset=0;
    let arcs='';
    sorted.forEach(([k,v],i)=>{
      const pct=v/total;
      const dash=circ*pct;
      const color=COLORS[i%COLORS.length];
      arcs+=`<circle cx="60" cy="60" r="44" fill="none" stroke="${color}" stroke-width="14" stroke-dasharray="${dash.toFixed(1)} ${(circ-dash).toFixed(1)}" stroke-dashoffset="${(-offset).toFixed(1)}" transform="rotate(-90 60 60)"/>`;
      offset+=dash;
    });
    h+='<div style="display:flex;justify-content:center;padding:6px 0 2px"><svg width="110" height="110" viewBox="0 0 120 120">';
    h+='<circle cx="60" cy="60" r="44" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="14"/>';
    h+=arcs;
    h+='<text x="60" y="55" text-anchor="middle" fill="#FAFAF7" font-size="12" font-weight="700" font-family="-apple-system,sans-serif">CHF</text>';
    h+='<text x="60" y="70" text-anchor="middle" fill="rgba(255,255,255,.6)" font-size="11" font-family="-apple-system,sans-serif">'+fmt(total)+'</text>';
    h+='</svg></div>';
  }

  // Week-on-week line chart
  const lineId='ausgLine'+Date.now();
  const today2=new Date();
  const weekDays=['Mo','Di','Mi','Do','Fr','Sa','So'];
  const thisWeekData=[],lastWeekData=[];
  for(let d=0;d<7;d++){
    const t=new Date(today2); t.setDate(t.getDate()-t.getDay()+1+d);
    const l=new Date(t); l.setDate(l.getDate()-7);
    const tISO=t.toISOString().slice(0,10),lISO=l.toISOString().slice(0,10);
    thisWeekData.push(Math.round(hbEntries(hy,hm).filter(e=>e.type==='out'&&e.date===tISO).reduce((s,e)=>s+(e.amount||0),0)));
    lastWeekData.push(Math.round(hbEntries(hy,hm).filter(e=>e.type==='out'&&e.date===lISO).reduce((s,e)=>s+(e.amount||0),0)));
  }
  h+='<div style="background:#0F100E;border:1px solid rgba(250,250,247,.22);padding:12px;margin-bottom:8px">';
  h+='<div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,.3);margin-bottom:2px">Diese Woche vs. letzte Woche</div>';
  h+='<div style="display:flex;gap:12px;margin-bottom:8px">';
  h+='<span style="font-size:10px;color:rgba(250,250,247,.7)"><span style="display:inline-block;width:20px;height:2px;background:#FAFAF7;vertical-align:middle;margin-right:4px"></span>Diese Woche</span>';
  h+='<span style="font-size:10px;color:rgba(250,250,247,.35)"><span style="display:inline-block;width:20px;height:2px;background:rgba(250,250,247,.35);vertical-align:middle;margin-right:4px;border-top:2px dashed rgba(250,250,247,.35)"></span>Letzte Woche</span>';
  h+='</div>';
  h+='<div style="position:relative;height:80px"><canvas id="'+lineId+'" role="img" aria-label="Wochenvergleich"></canvas></div>';
  h+='</div>';

  // 6-month bar chart
  const barId='ausgBar'+Date.now();
  const last6=[];
  for(let i=5;i>=0;i--){
    const bm=((curM-i)+12)%12;
    const by=curM-i<0?curY-1:curY;
    const amt=hbSum(by,bm,'out')+getInvoices().filter(iv=>iv.status==='bezahlt'&&(iv.budgetMonat??0)===bm&&(iv.budgetJahr??by)===by).reduce((s,iv)=>s+(iv.betrag||0),0);
    last6.push({m:MON_S[bm],v:Math.round(amt)});
  }
  h+='<div style="background:#0F100E;border:1px solid rgba(250,250,247,.22);padding:12px;margin-bottom:8px">';
  h+='<div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,.3);margin-bottom:10px">Verlauf 6 Monate</div>';
  h+='<div style="position:relative;height:100px"><canvas id="'+barId+'" role="img" aria-label="Ausgaben 6 Monate"></canvas></div>';
  h+='</div>';

  // Category cards\n  h+='<div style="margin-top:4px">';
  if(groups.length){
    groups.forEach((g,gi)=>{
      const gc=cats.filter(c=>c.groupId===g.id);
      const gtotal=gc.reduce((s,c)=>s+(byCat[c.id]||0),0);
      if(!gtotal)return;
      const color=COLORS[gi%COLORS.length];
      const shades=SHADES[gi%SHADES.length];
      const maxSub=Math.max(...gc.map(c=>byCat[c.id]||0),1);
      h+='<div class="mc-card"><div class="mc-head" style="background:'+color+'"><span class="mc-name">'+esc(g.label)+'</span><span class="mc-amt">'+fmtC(gtotal)+'</span></div><div class="mc-body">';
      gc.filter(c=>byCat[c.id]>0).sort((a,b)=>(byCat[b.id]||0)-(byCat[a.id]||0)).forEach((c,ci)=>{
        const v=byCat[c.id]||0,pct=v/maxSub*100;
        h+='<div class="mc-row"><span class="mc-lbl">'+esc(c.label)+'</span><div class="mc-bw"><div class="mc-bf" style="width:'+pct.toFixed(0)+'%;background:'+shades[ci%shades.length]+'"></div></div><span class="mc-val">'+fmt(v)+'</span></div>';
      });
      h+='</div></div>';
    });
  } else {
    const sorted=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
    sorted.forEach(([k,v],i)=>{
      const lbl=catMap[k]||(k==='_other'?'Sonstiges':k);
      const color=COLORS[i%COLORS.length];
      h+='<div class="mc-card"><div class="mc-head" style="background:'+color+'"><span class="mc-name">'+esc(lbl)+'</span><span class="mc-amt">'+fmtC(v)+'</span></div></div>';
    });
  }
  h+='</div>';
  h+='<div style="height:16px"></div>';

  // Init bar chart after DOM
  setTimeout(()=>{
    const el=document.getElementById(barId);
    if(!el||!window.Chart) return;
    new window.Chart(el,{
      type:'bar',
      data:{
        labels:last6.map(x=>x.m),
        datasets:[{data:last6.map(x=>x.v),backgroundColor:'rgba(250,250,247,.2)',borderColor:'rgba(250,250,247,.6)',borderWidth:1,borderRadius:0}]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>'CHF '+c.raw.toLocaleString('de-CH')}}},
        scales:{
          x:{ticks:{color:'rgba(250,250,247,.35)',font:{size:9}},grid:{display:false},border:{color:'transparent'}},
          y:{ticks:{color:'rgba(250,250,247,.35)',font:{size:9},callback:v=>v>0?Math.round(v/1000)+'k':'0'},grid:{color:'rgba(250,250,247,.06)'},border:{color:'transparent'}}
        }
      }
    });
  },100);

  return h;
}

// ── Tab: Rechnungen ───────────────────────────────────────
function renderRechnungen(){
  const today=new Date(),curM=today.getMonth(),curY=today.getFullYear(),nowStr=today.toISOString().slice(0,10);
  const nx=hbNext(curY,curM);
  const invs=getInvoices();
  const fmtD=d=>d?d.split('-').reverse().join('.'):'';

  const openCur=invs.filter(i=>i.status!=='bezahlt'&&(i.budgetMonat??0)===curM&&(i.budgetJahr??curY)===curY);
  const paidCur=invs.filter(i=>i.status==='bezahlt'&&(i.budgetMonat??0)===curM&&(i.budgetJahr??curY)===curY);
  const openNxt=invs.filter(i=>i.status!=='bezahlt'&&(i.budgetMonat??0)===nx.m&&(i.budgetJahr??nx.y)===nx.y);
  const openCurAmt=openCur.reduce((s,i)=>s+(i.betrag||0),0);
  const paidCurAmt=paidCur.reduce((s,i)=>s+(i.betrag||0),0);
  const openNxtAmt=openNxt.reduce((s,i)=>s+(i.betrag||0),0);

  function invRows(list){
    if(!list.length) return '<div class="inv-empty">Keine</div>';
    return list.sort((a,b)=>(a.faelligkeit||'9999')>(b.faelligkeit||'9999')?1:-1).map(inv=>{
      const overdue=inv.faelligkeit&&inv.faelligkeit<nowStr&&inv.status!=='bezahlt';
      return '<div class="inv-row">'+
        '<div><div class="inv-name">'+esc(inv.rechnungssteller||'—')+'</div>'+
        '<div class="inv-meta">'+(inv.bezahltAm?'Bezahlt '+fmtD(inv.bezahltAm):inv.faelligkeit?'Fällig '+fmtD(inv.faelligkeit):'')+
        (inv.notiz?' · '+esc(inv.notiz):'')+'</div></div>'+
        '<div style="text-align:right"><div class="inv-amt">'+fmtC(inv.betrag||0)+'</div>'+
        '<div class="inv-status'+(overdue?' warn':'')+'">'+esc(inv.status||'')+'</div></div>'+
        '</div>';
    }).join('');
  }

  function collapsableSection(id, title, amt, list){
    return '<div class="inv-sec-wrap" id="'+id+'">'+
      '<div class="inv-sec-hdr" onclick="toggleSec(\''+id+'\')" style="cursor:pointer">'+
      '<span class="inv-sec-t">'+title+'</span>'+
      '<div style="display:flex;align-items:center;gap:6px"><span class="inv-sec-v">'+fmtC(amt)+'</span>'+
      '<span id="chev-'+id+'" style="font-size:9px;color:rgba(255,255,255,.3)">▼</span></div>'+
      '</div>'+
      '<div id="body-'+id+'" style="display:none;border-top:1px solid rgba(255,255,255,.08)">'+invRows(list)+'</div>'+
      '</div>';
  }

  let h='<div class="stat-grid">';
  h+='<div class="stat-cell'+(openCur.length?' warn':'')+'"><div class="stat-val">'+openCur.length+'</div><div class="stat-lbl">Offen '+MON_S[curM]+'</div></div>';
  h+='<div class="stat-cell"><div class="stat-val">'+fmtC(paidCurAmt)+'</div><div class="stat-lbl">Bezahlt '+MON_S[curM]+'</div></div>';
  h+='<div class="stat-cell"><div class="stat-val">'+openNxt.length+'</div><div class="stat-lbl">Offen '+MON_S[nx.m]+'</div></div>';
  h+='<div class="stat-cell"><div class="stat-val">'+fmtC(openNxtAmt)+'</div><div class="stat-lbl">Fällig '+MON_S[nx.m]+'</div></div>';
  h+='</div>';
  h+=collapsableSection('inv-open-cur','Offen · '+MON_S[curM],openCurAmt,openCur);
  h+=collapsableSection('inv-paid-cur','Bezahlt · '+MON_S[curM],paidCurAmt,paidCur);
  h+=collapsableSection('inv-open-nxt','Offen · '+MON_S[nx.m],openNxtAmt,openNxt);
  h+='<div style="height:16px"></div>';
  return h;
}

function getInvoices(){
  return Object.entries(payload?.invoices||{}).map(([k,v])=>({...v,_id:k}));
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── Tab: Schulden ─────────────────────────────────────────
function renderSchulden(){
  const y=new Date().getFullYear();
  const structure=payload?.structure||[];
  const data=payload?.data||{};

  // Collect all debt items from verbind + schuld categories
  const debtCats=['verbind','schuld_estv','schuld_priv','schuld_firm'];
  const items=[];
  structure.forEach(cat=>{
    if(!debtCats.includes(cat.id)) return;
    (cat.subcats||[]).forEach(sc=>{
      (sc.items||[]).forEach(it=>{
        const ansatz=data[y]?.[it.id]?.ansatz||0;
        const start=data[y-1]?.[it.id]?.ansatz||data[y-2]?.[it.id]?.ansatz||ansatz;
        if(ansatz>0||start>0) items.push({id:it.id,label:it.label,current:ansatz,start,group:cat.label});
      });
    });
  });

  const totalCurrent=items.reduce((s,i)=>s+i.current,0);
  const totalStart=items.reduce((s,i)=>s+i.start,0)||totalCurrent;
  const totalTilgt=Math.max(0,totalStart-totalCurrent);
  const pct=totalStart>0?Math.min(100,totalTilgt/totalStart*100):0;

  // YTD tilgt: difference between start of this year and now
  const tilgtYTD=items.reduce((s,i)=>{
    const startY=data[y-1]?.[i.id]?.ansatz||i.start;
    return s+Math.max(0,startY-i.current);
  },0);
  // Avg monthly rate based on months elapsed this year
  const curM=new Date().getMonth();
  const avgMonthly=curM>0?tilgtYTD/curM:tilgtYTD;
  const monthsLeft=avgMonthly>0?Math.ceil(totalCurrent/avgMonthly):null;
  const doneYear=monthsLeft?y+Math.floor((new Date().getMonth()+monthsLeft)/12):null;

  let h='';

  // Hero
  h+='<div class="kpi-card">';
  h+='<div class="kpi-label">Aktueller Schuldenstand</div>';
  h+='<div class="kpi-val">'+fmtC(totalCurrent)+'</div>';
  h+='<div class="kpi-sub">von urspr. '+fmtC(totalStart)+'</div>';
  h+='<div class="hb-bar-wrap" style="margin:10px 0 4px"><div class="hb-bar-fill" style="width:'+pct.toFixed(1)+'%"></div></div>';
  h+='<div style="display:flex;justify-content:space-between;font-size:9px;color:var(--muted);font-variant-numeric:tabular-nums">';
  h+='<span>'+pct.toFixed(0)+'% abgebaut</span><span>'+fmtC(totalTilgt)+' getilgt</span></div>';
  h+='</div>';

  // KPI grid
  h+='<div class="stat-grid">';
  h+='<div class="stat-cell"><div class="stat-val">'+(avgMonthly>0?fmt(avgMonthly):'—')+'</div><div class="stat-lbl">Ø Rate '+y+'</div></div>';
  h+='<div class="stat-cell"><div class="stat-val">'+fmt(tilgtYTD)+'</div><div class="stat-lbl">Getilgt '+y+'</div></div>';
  h+='<div class="stat-cell"><div class="stat-val">'+(doneYear||'—')+'</div><div class="stat-lbl">Schuldenfrei</div></div>';
  h+='<div class="stat-cell"><div class="stat-val">'+items.length+'</div><div class="stat-lbl">Gläubiger</div></div>';
  h+='</div>';

  // Per creditor collapsable
  items.sort((a,b)=>b.current-a.current).forEach((item,i)=>{
    const pctItem=item.start>0?Math.min(100,(item.start-item.current)/item.start*100):0;
    const sid='debt-'+i;
    h+='<div class="inv-sec-wrap" id="'+sid+'">';
    h+='<div class="inv-sec-hdr" onclick="toggleSec(\''+sid+'\')" style="cursor:pointer">';
    h+='<div style="display:flex;align-items:center;gap:8px"><span class="inv-sec-t">'+esc(item.label)+'</span></div>';
    h+='<div style="display:flex;align-items:center;gap:6px"><span class="inv-sec-v">'+fmtC(item.current)+'</span><span id="chev-'+sid+'" style="font-size:9px;color:rgba(255,255,255,.3)">▼</span></div>';
    h+='</div>';
    h+='<div class="inv-sec-body" id="body-'+sid+'" style="display:none;border-top:1px solid rgba(255,255,255,.08);padding:10px 13px">';
    h+='<div style="font-size:11px;color:rgba(255,255,255,.5);margin-bottom:6px">'+esc(item.group)+'</div>';
    h+='<div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px"><span style="color:rgba(255,255,255,.4)">Ursprung</span><span style="font-variant-numeric:tabular-nums">'+fmtC(item.start)+'</span></div>';
    h+='<div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:8px"><span style="color:rgba(255,255,255,.4)">Getilgt</span><span style="font-variant-numeric:tabular-nums">'+fmtC(Math.max(0,item.start-item.current))+'</span></div>';
    h+='<div class="hb-bar-wrap" style="margin:6px 0 3px"><div class="hb-bar-fill" style="width:'+pctItem.toFixed(1)+'%"></div></div>';
    h+='<div style="text-align:right;font-size:9px;color:rgba(255,255,255,.3);margin-top:3px">'+pctItem.toFixed(0)+'% abgebaut</div>';
    h+='</div></div>';
  });

  if(!items.length) h+='<div style="padding:20px 0;text-align:center;font-size:12px;color:var(--muted)">Keine Schulden erfasst.</div>';
  h+='<div style="height:16px"></div>';
  return h;
}

function toggleSec(id){
  const body=document.getElementById('body-'+id);
  const chev=document.getElementById('chev-'+id);
  if(!body||!chev)return;
  const open=body.style.display==='none';
  body.style.display=open?'block':'none';
  chev.style.transform=open?'rotate(180deg)':'';
}

// ── openAddModal — Fullscreen ────────────────────────────
function openAddModal(){
  addForm={amount:'',type:'out',cat:'',desc:'',date:new Date().toISOString().slice(0,10)};
  const cats=hbCats();
  const el=document.createElement('div');
  el.className='modal-overlay'; el.id='add-modal';
  el.innerHTML=
    '<div class="modal-header">'+
      '<span class="modal-title">Neue Buchung</span>'+
      '<button class="modal-close" id="m-close">&#xD7;</button>'+
    '</div>'+
    '<div class="amount-wrap">'+
      '<span class="amount-label">Betrag (CHF)</span>'+
      '<input class="amount-input" id="m-amt" type="number" inputmode="decimal" placeholder="0.00">'+
    '</div>'+
    '<div class="type-toggle">'+
      '<button class="type-btn active" id="m-out">Ausgabe</button>'+
      '<button class="type-btn" id="m-in">Einnahme</button>'+
    '</div>'+
    '<div class="m-field">'+
      '<span class="cat-label">Kategorie</span>'+
      '<select id="m-cat" class="m-input">'+
        '<option value="">— Keine Kategorie —</option>'+
        cats.map(c=>'<option value="'+c.id+'">'+c.label+'</option>').join('')+
      '</select>'+
    '</div>'+
    '<div class="m-field">'+
      '<span class="cat-label">Beschreibung</span>'+
      '<input id="m-desc" class="m-input" placeholder="Beschreibung">'+
    '</div>'+
    '<div class="m-field">'+
      '<span class="cat-label">Datum</span>'+
      '<input id="m-date" class="m-input" type="date" value="'+new Date().toISOString().slice(0,10)+'">'+
    '</div>'+
    '<div class="modal-footer">'+
      '<button class="modal-cancel" id="m-can">Abbrechen</button>'+
      '<button class="modal-save" id="m-sav">Speichern</button>'+
    '</div>';
  document.body.appendChild(el);
  setTimeout(()=>document.getElementById('m-amt')?.focus(),80);
  function closeModal(){ el.remove(); }
  document.getElementById('m-close').onclick=closeModal;
  document.getElementById('m-can').onclick=closeModal;
  document.getElementById('m-out').addEventListener('click',()=>{
    addForm.type='out';
    document.getElementById('m-out').classList.add('active');
    document.getElementById('m-in').classList.remove('active');
  });
  document.getElementById('m-in').addEventListener('click',()=>{
    addForm.type='in';
    document.getElementById('m-in').classList.add('active');
    document.getElementById('m-out').classList.remove('active');
  });
  document.getElementById('m-sav').addEventListener('click',async()=>{
    addForm.amount=document.getElementById('m-amt').value;
    addForm.cat=document.getElementById('m-cat').value;
    addForm.desc=document.getElementById('m-desc').value;
    addForm.date=document.getElementById('m-date').value||new Date().toISOString().slice(0,10);
    if(!addForm.amount){showToast('Betrag eingeben');return;}
    closeModal();
    await addEntry();
  });
}


// ── Pull-to-refresh ──────────────────────────────────────
(function(){
  let startY=0,pulling=false,refreshing=false;
  document.addEventListener('touchstart',e=>{
    const tc=document.getElementById('tab-content');
    if(tc&&tc.scrollTop===0) startY=e.touches[0].clientY;
    else startY=0;
  },{passive:true});
  document.addEventListener('touchmove',e=>{
    if(!startY||refreshing) return;
    const dy=e.touches[0].clientY-startY;
    if(dy>10&&dy<80){
      pulling=true;
      const hint=document.getElementById('ptr-hint');
      if(hint){hint.style.display='block';hint.innerHTML=dy>50?'<div class="ptr-spinner"></div>':'<span>↓ Aktualisieren</span>';}
    }
  },{passive:true});
  document.addEventListener('touchend',async e=>{
    if(!pulling){startY=0;return;}
    const dy=e.changedTouches[0].clientY-startY;
    pulling=false;startY=0;
    if(dy>50&&!refreshing){
      refreshing=true;
      const hint=document.getElementById('ptr-hint');
      if(hint) hint.innerHTML='<div class="ptr-spinner"></div>';
      try{await loadFile();render();}catch(err){showToast('Fehler: '+err.message);}
      refreshing=false;
    } else {
      const hint=document.getElementById('ptr-hint');
      if(hint) hint.style.display='none';
    }
  });
})();

// ── Boot ──────────────────────────────────────────────────
async function boot(){
  _status='loading'; render();
  if(!cfg){ _status='setup'; render(); return; }
  try{
    if(new URLSearchParams(window.location.search).has('code')){
      await handleRedirect();
    }
    if(!await ensureToken()){ await startLogin(); return; }
    await loadFile();
    _status='ready';
  }catch(e){ _status='error'; _errMsg=e.message||String(e); }
  render();
}

cfg=loadCfg();
boot();
</script>
