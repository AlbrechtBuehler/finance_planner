<title>Finanzplaner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#000;--surface:#0F100E;--border:rgba(250,250,247,.18);--border-strong:rgba(250,250,247,.55);--text:#FAFAF7;--muted:rgba(250,250,247,.5);--accent:#FAFAF7;--safe-top:env(safe-area-inset-top);--safe-bot:env(safe-area-inset-bottom)}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,sans-serif}
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto}
.setup{flex:1;display:flex;flex-direction:column;justify-content:center;padding:32px 24px;gap:20px}
.setup h1{font-size:22px;font-weight:600}
.setup p{font-size:13px;color:var(--muted);line-height:1.6}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.field input{width:100%;background:var(--surface);border:1px solid var(--border-strong);color:var(--text);font-family:inherit;font-size:15px;padding:13px 14px;outline:none;-webkit-appearance:none;border-radius:0}
.field input::placeholder{color:var(--muted)}
.btn{background:var(--accent);color:#000;font-family:inherit;font-size:15px;font-weight:600;padding:14px;border:none;cursor:pointer;width:100%}
.btn:active{opacity:.8}
.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border-strong);font-family:inherit;font-size:13px;padding:10px;cursor:pointer;width:100%}
.center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px;text-align:center}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.center p,.err-msg{font-size:14px;color:var(--muted);line-height:1.6;max-width:300px}
.header{padding:calc(var(--safe-top) + 14px) 20px 12px;display:flex;align-items:baseline;justify-content:space-between;border-bottom:1px solid var(--border)}
.header-title{font-size:13px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--muted)}
.header-sub{font-size:11px;color:var(--muted)}
.reload-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:2px 6px}
.tab-content{flex:1;overflow-y:auto;padding:20px 16px;-webkit-overflow-scrolling:touch}
.bottom-nav{display:flex;border-top:1px solid var(--border);padding-bottom:var(--safe-bot);background:var(--bg)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:11px 8px;background:none;border:none;cursor:pointer;font-family:inherit}
.nav-btn svg{width:20px;height:20px;stroke:var(--muted);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.nav-btn span{font-size:10px;color:var(--muted);letter-spacing:.03em}
.nav-btn.active svg{stroke:var(--accent)}
.nav-btn.active span{color:var(--accent)}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.kpi-card{background:var(--surface);padding:14px;display:flex;flex-direction:column;gap:4px}
.kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)}
.kpi-val{font-size:20px;font-weight:600;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.kpi-sub{font-size:11px;color:var(--muted)}
.section-line{height:1px;background:var(--border);margin:20px 0 16px}
.section-title{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:12px}
.hb-card{background:var(--surface);border:1px solid var(--border-strong);padding:15px;margin-bottom:10px}
.hb-card.current{border-left:3px solid var(--accent);background:#0F100E}
.hb-card-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.hb-card-period{font-size:12px;font-weight:500}
.hb-card-badge{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.hb-card.current .hb-card-badge{font-weight:700;color:var(--text)}
.hb-hero{font-size:26px;font-weight:600;font-variant-numeric:tabular-nums;letter-spacing:-.02em;margin-bottom:2px}
.hb-hero-label{font-size:11px;color:var(--muted);margin-bottom:10px}
.hb-bar-wrap{height:3px;background:rgba(250,250,247,.1);position:relative;margin-bottom:4px}
.hb-bar-fill{height:100%;background:var(--accent)}
.hb-bar-tick{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--accent);opacity:.4;transform:translateX(-50%)}
.hb-bar-info{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);font-variant-numeric:tabular-nums}
.hb-foot{font-size:11px;color:var(--muted);margin-top:8px}
.schuld-bar-wrap{height:3px;background:rgba(250,250,247,.1);margin:8px 0 6px}
.schuld-bar-fill{height:100%;background:var(--accent)}
.schuld-row{display:flex;justify-content:space-between;align-items:baseline}
.schuld-val{font-size:18px;font-weight:600;font-variant-numeric:tabular-nums}
.schuld-sub{font-size:11px;color:var(--muted)}
.fab{position:fixed;bottom:calc(var(--safe-bot) + 68px);right:20px;width:52px;height:52px;background:var(--accent);color:#000;border:none;border-radius:50%;cursor:pointer;font-size:24px;font-weight:300;display:flex;align-items:center;justify-content:center;z-index:50;line-height:1}
.modal-overlay{position:fixed;top:0;right:0;bottom:0;left:0;background:var(--bg);z-index:200;display:flex;flex-direction:column}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:calc(var(--safe-top) + 16px) 20px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-title{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.modal-close{background:none;border:none;color:var(--text);font-size:30px;font-weight:300;cursor:pointer;padding:0;line-height:1}
.modal-body{flex:1;overflow-y:auto}
.amount-wrap{padding:24px 20px 20px;border-bottom:1px solid var(--border)}
.amount-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:10px;display:block}
.amount-input{font-size:48px;font-weight:300;font-variant-numeric:tabular-nums;width:100%;background:none;border:none;color:var(--text);font-family:inherit;padding:0;outline:none;text-align:right;display:block}
.type-toggle{display:flex;margin:20px 20px 0}
.type-btn{flex:1;padding:11px;background:none;border:1px solid var(--border-strong);color:var(--muted);font-family:inherit;font-size:14px;cursor:pointer}
.type-btn:first-child{border-right:none}
.type-btn.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
.cat-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:20px 20px 10px;display:block}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 20px}
.cat-btn{padding:11px 6px;background:none;border:1px solid var(--border-strong);color:var(--muted);font-family:inherit;font-size:13px;cursor:pointer;text-align:center}
.cat-btn.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
.desc-input{width:calc(100% - 40px);margin:20px 20px 0;background:var(--surface);border:1px solid var(--border-strong);color:var(--text);font-family:inherit;font-size:14px;padding:12px;outline:none;display:block}
.desc-input::placeholder{color:var(--muted)}
.modal-footer{padding:20px 20px calc(var(--safe-bot) + 20px);display:flex;gap:10px}
.modal-save{flex:1;background:var(--accent);color:#000;font-family:inherit;font-size:15px;font-weight:600;padding:14px;border:none;cursor:pointer}
.modal-cancel{background:none;border:1px solid var(--border-strong);color:var(--muted);font-family:inherit;font-size:14px;padding:14px 20px;cursor:pointer}
.toast{position:fixed;bottom:calc(var(--safe-bot) + 80px);left:50%;transform:translateX(-50%);background:var(--accent);color:#000;font-size:13px;font-weight:600;padding:10px 20px;z-index:200;animation:tin .1s ease,tout .3s ease 1.7s forwards;white-space:nowrap}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%)}}
@keyframes tout{to{opacity:0}}
</style>
</head>
<body>
<div id="app"></div>
<script>
'use strict';
const CFG_KEY='fp_mobile_cfg_v2';
const MON_S=['Jan','Feb','Mrz','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
const MON_F=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
const GRAPH='https://graph.microsoft.com/v1.0';
const SCOPE='https://graph.microsoft.com/Files.ReadWrite offline_access';

let cfg=null, token=null, payload=null;
let tab='overview', showAdd=false, saving=false;
let addForm={amount:'',type:'out',cat:'',desc:''};
let _status='init', _errMsg='';

// ── Config ──────────────────────────────────────────────
function loadCfg(){ try{ return JSON.parse(localStorage.getItem(CFG_KEY)); }catch(e){ return null; } }
function saveCfg(c){ localStorage.setItem(CFG_KEY,JSON.stringify(c)); }

// ── PKCE OAuth (no external library) ────────────────────
function redirectUri(){ return window.location.href.split('?')[0].split('#')[0]; }
function tenantAuthority(){ return 'https://login.microsoftonline.com/'+(cfg.tenantId||'common'); }

function b64url(buf){
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
function genVerifier(){
  const a=new Uint8Array(32); crypto.getRandomValues(a); return b64url(a.buffer);
}
async function genChallenge(v){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(v));
  return b64url(buf);
}

async function startLogin(){
  const v=genVerifier();
  const ch=await genChallenge(v);
  localStorage.setItem('pkce_v',v);
  localStorage.setItem('pkce_state',cfg.filePath);
  const p=new URLSearchParams({
    client_id:cfg.clientId, response_type:'code',
    redirect_uri:redirectUri(), scope:SCOPE,
    code_challenge:ch, code_challenge_method:'S256',
    response_mode:'query'
  });
  window.location.href=tenantAuthority()+'/oauth2/v2.0/authorize?'+p;
}

async function handleRedirect(){
  const p=new URLSearchParams(window.location.search);
  const code=p.get('code');
  if(!code) return false;
  window.history.replaceState({},'',redirectUri());
  const v=localStorage.getItem('pkce_v');
  if(!v) return false;
  const r=await fetch(tenantAuthority()+'/oauth2/v2.0/token',{
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:new URLSearchParams({
      client_id:cfg.clientId, grant_type:'authorization_code',
      code, redirect_uri:redirectUri(),
      code_verifier:v, scope:SCOPE
    })
  });
  const d=await r.json();
  if(d.access_token){ token=d.access_token; if(d.refresh_token) localStorage.setItem('rt',d.refresh_token); localStorage.removeItem('pkce_v'); return true; }
  throw new Error(d.error_description||'Token-Fehler');
}

async function refreshToken(){
  const rt=localStorage.getItem('rt'); if(!rt) return false;
  const r=await fetch(tenantAuthority()+'/oauth2/v2.0/token',{
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:new URLSearchParams({client_id:cfg.clientId,grant_type:'refresh_token',refresh_token:rt,scope:SCOPE})
  });
  const d=await r.json();
  if(d.access_token){ token=d.access_token; if(d.refresh_token) localStorage.setItem('rt',d.refresh_token); return true; }
  localStorage.removeItem('rt'); return false;
}

async function ensureToken(){
  if(token) return true;
  if(await refreshToken()) return true;
  return false;
}

// ── Graph API ────────────────────────────────────────────
async function graphGet(path){
  if(!await ensureToken()) throw new Error('Nicht angemeldet');
  const r=await fetch(GRAPH+path,{headers:{'Authorization':'Bearer '+token}});
  if(r.status===401){ token=null; if(await refreshToken()){ return graphGet(path); } throw new Error('Sitzung abgelaufen. Neu laden.'); }
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r;
}
async function graphPut(path,data){
  if(!await ensureToken()) throw new Error('Nicht angemeldet');
  const r=await fetch(GRAPH+path,{method:'PUT',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify(data,null,2)});
  if(!r.ok) throw new Error('HTTP '+r.status);
}
async function loadFile(){
  const enc=cfg.filePath.split('/').map(encodeURIComponent).join('/');
  const r=await graphGet('/me/drive/root:/'+enc+':/content');
  payload=await r.json();
}
async function saveFile(){
  if(!payload) return;
  saving=true; render();
  try{ const enc=cfg.filePath.split('/').map(encodeURIComponent).join('/'); await graphPut('/me/drive/root:/'+enc+':/content',payload); }
  catch(e){ showToast('Fehler: '+e.message); }
  finally{ saving=false; render(); }
}

// ── HB helpers ───────────────────────────────────────────
function fmt(v){ if(v===null||v===undefined||isNaN(v)) return '—'; const neg=v<0,abs=Math.abs(v),p=abs.toFixed(2).split('.'); p[0]=p[0].replace(/\B(?=(\d{3})+(?!\d))/g,"'"); return (neg?'−':'')+p.join('.'); }
function fmtC(v){ return 'CHF '+fmt(v); }
function hbKey(y,m){ return y+'-'+String(m+1).padStart(2,'0'); }
function hbCfg(){ return payload?.data?._hb?.config||{defaultDay:25}; }
function hbPer(){ return payload?.data?._hb?.periods||{}; }
function hbLohnDay(y,m){ return hbPer()[hbKey(y,m)]?.lohnDay||hbCfg().defaultDay||25; }
function hbStart(y,m){ const k=hbKey(y,m),s=hbPer()[k]?.startISO; if(s){const d=new Date(s+'T00:00:00');if(!isNaN(d))return d;} const day=hbLohnDay(y,m); return new Date(y,m,Math.min(day,new Date(y,m+1,0).getDate())); }
function hbEnd(y,m){ const k=hbKey(y,m),s=hbPer()[k]?.endISO; if(s){const d=new Date(s+'T00:00:00');if(!isNaN(d))return d;} const ny=m===11?y+1:y,nm=(m+1)%12; return new Date(hbStart(ny,nm).getTime()-86400000); }
function hbEntries(y,m){ return hbPer()[hbKey(y,m)]?.entries||[]; }
function hbSum(y,m,t){ return hbEntries(y,m).filter(e=>e.type===t).reduce((s,e)=>s+(e.amount||0),0); }
function hbBudget(y,m){ return hbPer()[hbKey(y,m)]?.budget||0; }
function hbCalc(y,m){
  const today=new Date();today.setHours(0,0,0,0);
  const start=hbStart(y,m),end=hbEnd(y,m);
  const isCur=today>=start&&today<=end,isPast=!isCur&&today>end,isFuture=!isCur&&!isPast;
  const budget=hbBudget(y,m),ausgaben=hbSum(y,m,'out'),einnahmen=hbSum(y,m,'in');
  const saldo=budget+einnahmen-ausgaben,totalDays=Math.round((end-start)/86400000)+1;
  let remainDays=0,perDay=0,dayUsed=0,avgDay=0;
  if(isCur){remainDays=Math.max(0,Math.round((end-today)/86400000)+1);perDay=remainDays>0?saldo/remainDays:0;dayUsed=Math.max(1,Math.round((today-start)/86400000)+1);}
  else if(isPast){dayUsed=totalDays;}
  avgDay=dayUsed>0&&ausgaben>0?ausgaben/dayUsed:0;
  const pct=budget>0?Math.min(100,ausgaben/(budget+einnahmen)*100):0;
  const dStr=d=>String(d.getDate()).padStart(2,'0')+'. '+MON_S[d.getMonth()];
  return {budget,ausgaben,einnahmen,saldo,totalDays,remainDays,perDay,dayUsed,avgDay,pct,isCur,isPast,isFuture,start,end,label:dStr(start)+' – '+dStr(end)};
}
function hbCurPeriod(){ const t=new Date(); for(let m=0;m<12;m++){const c=hbCalc(t.getFullYear(),m);if(c.isCur)return{y:t.getFullYear(),m};} return{y:t.getFullYear(),m:t.getMonth()}; }
function hbNext(y,m){ return m===11?{y:y+1,m:0}:{y,m:m+1}; }
function hbCats(){ const c=payload?.data?._hb?.config?.categories||[]; if(c.length)return c.map(x=>typeof x==='string'?{id:x,label:x}:x); return [{id:'lebensmittel',label:'Lebensm.'},{id:'restaurant',label:'Restaurant'},{id:'transport',label:'Transport'},{id:'gesundheit',label:'Gesundheit'},{id:'freizeit',label:'Freizeit'},{id:'haushalt',label:'Haushalt'},{id:'kleidung',label:'Kleidung'},{id:'sonstiges',label:'Sonstiges'}]; }

// ── KPI helpers ───────────────────────────────────────────
function mVal(id,m,y){ return payload?.data?.[y||new Date().getFullYear()]?.[id]?.months?.[m]||0; }
function schuldenAktuell(){ let t=0; (payload?.structure||[]).find(c=>c.id==='verbind')?.subcats?.forEach(sc=>(sc.items||[]).forEach(it=>{t+=(payload?.data?.[new Date().getFullYear()]?.[it.id]?.ansatz||0);})); return t; }
function schuldenStart(){ let t=0; const structure=payload?.structure||[]; const v=structure.find(c=>c.id==='verbind'); v?.subcats?.forEach(sc=>(sc.items||[]).forEach(it=>{t+=(payload?.data?.[2024]?.[it.id]?.ansatz||payload?.data?.[2025]?.[it.id]?.ansatz||0);})); return t||schuldenAktuell(); }

// ── Add entry ────────────────────────────────────────────
async function addEntry(){
  const amt=parseFloat(String(addForm.amount).replace(/[']/g,'').replace(',','.'));
  if(!amt||isNaN(amt)){showToast('Betrag eingeben');return;}
  const{y,m}=hbCurPeriod(),k=hbKey(y,m);
  if(!payload.data._hb)payload.data._hb={config:{defaultDay:25},periods:{}};
  if(!payload.data._hb.periods[k])payload.data._hb.periods[k]={entries:[]};
  payload.data._hb.periods[k].entries.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),type:addForm.type,amount:amt,desc:addForm.desc||addForm.cat||'',cat:addForm.cat||null,date:new Date().toISOString().slice(0,10)});
  addForm={amount:'',type:'out',cat:'',desc:''};showAdd=false;
  await saveFile();showToast('Gespeichert');
}

// ── Toast ─────────────────────────────────────────────────
function showToast(msg){ const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2100); }

// ── Render ────────────────────────────────────────────────
function render(){
  const app=document.getElementById('app');
  if(_status==='setup'){ app.innerHTML=renderSetup(); bindSetup(); return; }
  if(_status==='loading'){ app.innerHTML='<div class="center"><div class="spinner"></div><p>Verbinde…</p></div>'; return; }
  if(_status==='error'){ app.innerHTML=renderError(); bindError(); return; }
  app.innerHTML=renderMain(); bindMain();
}

function renderSetup(){
  return '<div class="setup"><h1>Finanzplaner</h1><p>Einmalige Einrichtung.</p>'+
  '<div class="field"><label>Azure Client ID</label><input id="s-cid" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" autocomplete="off" spellcheck="false"></div>'+
  '<div class="field"><label>OneDrive-Pfad</label><input id="s-path" placeholder="Dokumente/fp.json" autocomplete="off" spellcheck="false"></div>'+
  '<button class="btn" id="s-go">Verbinden</button></div>';
}
function bindSetup(){
  document.getElementById('s-go').onclick=async()=>{
    const cid=document.getElementById('s-cid').value.trim();
    const path=document.getElementById('s-path').value.trim().replace(/^\/+/,'');
    if(!cid||!path){showToast('Bitte ausfüllen');return;}
    cfg={clientId:cid,filePath:path,tenantId:'89cc8152-7ce8-4275-8e4e-de52f805c629'};
    saveCfg(cfg); await startLogin();
  };
}

function renderError(){
  return '<div class="center"><p class="err-msg">'+_errMsg+'</p><button class="btn" id="e-retry" style="max-width:220px">Erneut versuchen</button><button class="btn-ghost" id="e-reset" style="max-width:220px;margin-top:8px">Einstellungen zurücksetzen</button></div>';
}
function bindError(){
  document.getElementById('e-retry').onclick=boot;
  document.getElementById('e-reset').onclick=()=>{cfg=null;token=null;localStorage.clear();_status='setup';render();};
}

function renderMain(){
  const now=new Date(),mo=MON_F[now.getMonth()]+' '+now.getFullYear();
  return '<div class="header"><div><div class="header-title">Finanzplaner</div><div class="header-sub">'+mo+'</div></div><button class="reload-btn" id="btn-reload">↺</button></div>'+
  '<div class="tab-content">'+( tab==='hb'?renderHB():renderOverview() )+'</div>'+
  '<div class="bottom-nav">'+
  '<button class="nav-btn'+(tab==='overview'?' active':'')+'" id="nav-ov"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span>Übersicht</span></button>'+
  '<button class="nav-btn'+(tab==='hb'?' active':'')+'" id="nav-hb"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 10h16M4 14h10"/></svg><span>Haushaltsbuch</span></button>'+
  '</div>'+(tab==='hb'?'<button class="fab" id="btn-fab">+</button>':'')+
  (showAdd?renderSheet():'');
}
function bindMain(){
  document.getElementById('nav-ov').onclick=()=>{tab='overview';render();};
  document.getElementById('nav-hb').onclick=()=>{tab='hb';render();};
  document.getElementById('btn-reload')?.addEventListener('click',async()=>{_status='loading';render();try{await loadFile();_status='ready';}catch(e){_status='error';_errMsg=e.message;}render();});
  document.getElementById('btn-fab')?.addEventListener('click',openAddModal);
}

function renderOverview(){
  const y=new Date().getFullYear(),m=new Date().getMonth();
  const netto=mVal('netto',m,y),ausg=mVal('summe_ausgaben',m,y),saldo=netto-ausg,sparq=netto>0?Math.round(saldo/netto*100):0;
  const{y:hy,m:hm}=hbCurPeriod(),hbc=hbCalc(hy,hm);
  const schuld=schuldenAktuell(),schuldI=schuldenStart(),pct=schuldI>0?Math.min(100,Math.round((1-schuld/schuldI)*100)):0;
  let h='<div class="kpi-grid">'+kpi('Netto',fmtC(netto))+kpi('Ausgaben',fmtC(ausg))+kpi('Saldo',fmtC(saldo))+kpi('Sparquote',sparq+'%','Monat')+'</div>';
  if(hbc.budget>0) h+='<div class="section-line"></div><div class="section-title">Haushaltsbuch</div><div class="kpi-grid">'+kpi('Verfügbar / Tag',hbc.isCur&&hbc.remainDays>0?fmtC(hbc.perDay):'—',hbc.remainDays+' Tage rest')+kpi('Ausgegeben',fmtC(hbc.ausgaben),'von '+fmtC(hbc.budget))+'</div>';
  if(schuld>0) h+='<div class="section-line"></div><div class="section-title">Schulden</div><div class="schuld-row"><span class="schuld-val">'+fmtC(schuld)+'</span><span class="schuld-sub">'+pct+'% abgebaut</span></div><div class="schuld-bar-wrap"><div class="schuld-bar-fill" style="width:'+pct+'%"></div></div>';
  return h;
}
function kpi(l,v,s){ return '<div class="kpi-card"><div class="kpi-label">'+l+'</div><div class="kpi-val">'+v+'</div>'+(s?'<div class="kpi-sub">'+s+'</div>':'')+'</div>'; }

function renderHB(){
  const{y:cy,m:cm}=hbCurPeriod(),nx=hbNext(cy,cm);
  return hbCard(cy,cm,hbCalc(cy,cm),true)+hbCard(nx.y,nx.m,hbCalc(nx.y,nx.m),false);
}
function hbCard(y,m,c,isCur){
  let hero,hl,foot;
  if(c.isCur&&c.budget>0){hero=fmtC(c.perDay);hl='CHF / Tag · '+c.remainDays+' T. rest';foot='Saldo '+fmtC(c.saldo)+' · Budget '+fmtC(c.budget);}
  else if(c.isPast&&c.budget>0){hero=fmtC(c.avgDay);hl='Ø CHF / Tag';foot='Saldo '+fmtC(c.saldo);}
  else if(c.budget>0){hero=fmtC(c.budget);hl='Budget';foot=c.totalDays+' Tage geplant';}
  else{hero='—';hl=c.isCur?'kein Budget':'—';foot=c.totalDays+' Tage';}
  const badge=c.isCur?'Laufend':c.isFuture?'Geplant':'';
  let bar;
  if(isCur&&c.budget>0&&c.totalDays>0){
    const sp=Math.min(100,c.pct).toFixed(1),tp=Math.min(100,c.dayUsed/c.totalDays*100).toFixed(1);
    bar='<div class="hb-bar-wrap"><div class="hb-bar-fill" style="width:'+sp+'%"></div><div class="hb-bar-tick" style="left:'+tp+'%"></div></div><div class="hb-bar-info"><span>'+fmtC(c.ausgaben)+' ausgegeben</span><span>Tag '+c.dayUsed+' / '+c.totalDays+'</span></div>';
  }else{
    bar='<div class="hb-bar-wrap"><div class="hb-bar-fill" style="width:'+c.pct.toFixed(1)+'%"></div></div>';
  }
  return '<div class="hb-card'+(isCur?' current':'')+'"><div class="hb-card-head"><span class="hb-card-period">'+c.label+' '+y+'</span><span class="hb-card-badge">'+badge+'</span></div><div class="hb-hero">'+hero+'</div><div class="hb-hero-label">'+hl+'</div>'+bar+'<div class="hb-foot">'+foot+'</div></div>';
}

function openAddModal(){
  addForm={amount:'',type:'out',cat:'',desc:''};
  const cats=hbCats();
  const el=document.createElement('div');
  el.className='modal-overlay'; el.id='add-modal';
  el.innerHTML=
    '<div class="modal-header">'+
      '<span class="modal-title">Neue Buchung</span>'+
      '<button class="modal-close" id="m-close">&#xD7;</button>'+
    '</div>'+
    '<div class="modal-body">'+
      '<div class="amount-wrap">'+
        '<span class="amount-label">Betrag (CHF)</span>'+
        '<input class="amount-input" id="m-amt" type="number" inputmode="decimal" placeholder="0.00">'+
      '</div>'+
      '<div class="type-toggle">'+
        '<button class="type-btn active" id="m-out">Ausgabe</button>'+
        '<button class="type-btn" id="m-in">Einnahme</button>'+
      '</div>'+
      '<span class="cat-label">Kategorie</span>'+
      '<div class="cat-grid">'+cats.map(c=>'<button class="cat-btn" data-cat="'+c.id+'">'+c.label+'</button>').join('')+'</div>'+
      '<input class="desc-input" id="m-desc" placeholder="Beschreibung (optional)">'+
    '<div class="modal-footer">'+
      '<button class="modal-cancel" id="m-can">Abbrechen</button>'+
      '<button class="modal-save" id="m-sav">Speichern</button>'+
    '</div>'+
    '</div>';
  document.body.appendChild(el);
  setTimeout(()=>document.getElementById('m-amt')?.focus(),80);
  function closeModal(){ el.remove(); }
  document.getElementById('m-close').onclick=closeModal;
  document.getElementById('m-can').onclick=closeModal;
  document.getElementById('m-out').addEventListener('click',()=>{
    addForm.type='out';
    document.getElementById('m-out').classList.add('active');
    document.getElementById('m-in').classList.remove('active');
  });
  document.getElementById('m-in').addEventListener('click',()=>{
    addForm.type='in';
    document.getElementById('m-in').classList.add('active');
    document.getElementById('m-out').classList.remove('active');
  });
  el.querySelectorAll('.cat-btn').forEach(b=>b.addEventListener('click',()=>{
    el.querySelectorAll('.cat-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    addForm.cat=b.dataset.cat;
  }));
  document.getElementById('m-sav').addEventListener('click',async()=>{
    addForm.amount=document.getElementById('m-amt').value;
    addForm.desc=document.getElementById('m-desc').value;
    closeModal();
    await addEntry();
  });
}
function renderSheet(){ return ''; }
function bindSheet(){}

// ── Boot ──────────────────────────────────────────────────
async function boot(){
  _status='loading'; render();
  if(!cfg){ _status='setup'; render(); return; }
  try{
    if(new URLSearchParams(window.location.search).has('code')){
      await handleRedirect();
    }
    if(!await ensureToken()){ await startLogin(); return; }
    await loadFile();
    _status='ready';
  }catch(e){ _status='error'; _errMsg=e.message||String(e); }
  render();
}

cfg=loadCfg();
boot();
</script>
